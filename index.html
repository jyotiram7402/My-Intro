  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"eff4ed93-e938-424a-8109-ab3a450f3215\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"63501dff-0b01-46f0-b3b5-c09628f9b5af\"><\u002Fscript>\n<style>\n  :root {\n    --ink:        #0A1628;\n    --ink-2:      #15243D;\n    --ink-3:      #2A3B57;\n    --muted:      #5A6B85;\n    --line:       #E4E9F2;\n    --line-2:     #C9D3E3;\n    --paper:      #FFFFFF;\n    --paper-2:    #F5F8FC;\n    --blue:       #1E5FD9;\n    --blue-2:     #3B7AF0;\n    --blue-soft:  #E8F0FE;\n    --accent:     #00B4D8;\n  }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: #0A1628;\n    font-family: 'Manrope', system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    color: var(--ink);\n  }\n\n  deck-stage section {\n    background: var(--paper);\n    overflow: hidden;\n  }\n\n  /* ---------- Animation primitives ---------- */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(24px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes fadeIn {\n    from { opacity: 0; }\n    to   { opacity: 1; }\n  }\n  @keyframes slideInRight {\n    from { opacity: 0; transform: translateX(40px); }\n    to   { opacity: 1; transform: translateX(0); }\n  }\n  @keyframes slideInLeft {\n    from { opacity: 0; transform: translateX(-40px); }\n    to   { opacity: 1; transform: translateX(0); }\n  }\n  @keyframes scaleIn {\n    from { opacity: 0; transform: scale(0.94); }\n    to   { opacity: 1; transform: scale(1); }\n  }\n  @keyframes drawLine {\n    from { transform: scaleX(0); }\n    to   { transform: scaleX(1); }\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 0.4; }\n    50%      { opacity: 1; }\n  }\n  @keyframes float {\n    0%, 100% { transform: translateY(0); }\n    50%      { transform: translateY(-8px); }\n  }\n\n  /* Active-slide trigger: starter component sets data-active on the current slide */\n  deck-stage section[data-deck-active] .anim { animation-play-state: running; }\n  .anim {\n    opacity: 0;\n    animation-fill-mode: forwards;\n    animation-play-state: paused;\n    animation-duration: 0.75s;\n    animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  .a-fadeUp     { animation-name: fadeUp; }\n  .a-fadeIn     { animation-name: fadeIn; }\n  .a-slideRight { animation-name: slideInRight; }\n  .a-slideLeft  { animation-name: slideInLeft; }\n  .a-scaleIn    { animation-name: scaleIn; }\n\n  .d1 { animation-delay: 0.05s; }\n  .d2 { animation-delay: 0.18s; }\n  .d3 { animation-delay: 0.32s; }\n  .d4 { animation-delay: 0.46s; }\n  .d5 { animation-delay: 0.60s; }\n  .d6 { animation-delay: 0.74s; }\n  .d7 { animation-delay: 0.88s; }\n  .d8 { animation-delay: 1.02s; }\n\n  /* ---------- Shared slide frame ---------- */\n  .slide-frame {\n    width: 100%;\n    height: 100%;\n    padding: 100px;\n    box-sizing: border-box;\n    display: flex;\n    flex-direction: column;\n    position: relative;\n  }\n\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 14px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    color: var(--blue);\n    text-transform: uppercase;\n  }\n  .eyebrow::before {\n    content: '';\n    width: 48px;\n    height: 2px;\n    background: var(--blue);\n    display: inline-block;\n  }\n\n  .slide-title {\n    font-size: 80px;\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    line-height: 1.02;\n    color: var(--ink);\n    margin: 28px 0 0 0;\n  }\n\n  .slide-num {\n    position: absolute;\n    bottom: 48px;\n    right: 100px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: var(--muted);\n    letter-spacing: 0.1em;\n  }\n  .slide-brand {\n    position: absolute;\n    bottom: 48px;\n    left: 100px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: var(--muted);\n    letter-spacing: 0.1em;\n  }\n\n  /* ---------- Slide 1: About Me ---------- */\n  .s1 {\n    background:\n      radial-gradient(1200px 600px at 85% 15%, rgba(59, 122, 240, 0.12), transparent 60%),\n      radial-gradient(900px 500px at 10% 95%, rgba(0, 180, 216, 0.08), transparent 55%),\n      linear-gradient(180deg, #0A1628 0%, #0D1B30 100%);\n    color: white;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n  }\n  .s1-left {\n    padding: 100px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    position: relative;\n  }\n  .s1-right {\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 80px;\n  }\n\n  .s1 .eyebrow { color: #7FB2FF; }\n  .s1 .eyebrow::before { background: #7FB2FF; }\n\n  .s1-title {\n    font-size: 108px;\n    font-weight: 700;\n    letter-spacing: -0.035em;\n    line-height: 0.95;\n    margin: 32px 0 56px 0;\n    color: white;\n  }\n\n  .s1-info {\n    display: flex;\n    flex-direction: column;\n    gap: 22px;\n    border-top: 1px solid rgba(255, 255, 255, 0.12);\n    padding-top: 40px;\n  }\n  .s1-info-row {\n    display: grid;\n    grid-template-columns: 220px 1fr;\n    align-items: baseline;\n    gap: 24px;\n  }\n  .s1-info-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: #7FB2FF;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  .s1-info-value {\n    font-size: 32px;\n    font-weight: 500;\n    color: white;\n    letter-spacing: -0.01em;\n  }\n  .s1-info-value strong {\n    font-weight: 700;\n  }\n\n  /* Avatar / portrait card */\n  .portrait-card {\n    width: 560px;\n    height: 680px;\n    border-radius: 20px;\n    position: relative;\n    overflow: hidden;\n    background: linear-gradient(135deg, #1E5FD9 0%, #0A1628 100%);\n    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);\n  }\n  .portrait-grid {\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);\n    background-size: 40px 40px;\n  }\n  .portrait-glow {\n    position: absolute;\n    top: -10%;\n    left: -10%;\n    width: 70%;\n    height: 70%;\n    background: radial-gradient(circle, rgba(127, 178, 255, 0.35), transparent 65%);\n    filter: blur(40px);\n  }\n  .avatar-mono {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-direction: column;\n  }\n  .avatar-circle {\n    width: 440px;\n    height: 440px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 50% 40%, #15243D 0%, #0A1628 70%, #050D1C 100%);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 3px rgba(127, 178, 255, 0.4), inset 0 0 40px rgba(59, 122, 240, 0.15);\n    position: relative;\n    z-index: 2;\n  }\n  .avatar-circle img {\n    width: 92%;\n    height: auto;\n    display: block;\n    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 62%, transparent 92%);\n    mask-image: radial-gradient(circle at 50% 50%, black 62%, transparent 92%);\n  }\n  .avatar-ring {\n    position: absolute;\n    width: 500px;\n    height: 500px;\n    border-radius: 50%;\n    border: 1px solid rgba(127, 178, 255, 0.3);\n    z-index: 1;\n  }\n  .avatar-ring.r2 {\n    width: 580px;\n    height: 580px;\n    border-style: dashed;\n    animation: spin 40s linear infinite;\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .portrait-tag {\n    position: absolute;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 14px 22px;\n    background: rgba(10, 22, 40, 0.75);\n    backdrop-filter: blur(12px);\n    border: 1px solid rgba(127, 178, 255, 0.3);\n    border-radius: 100px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: white;\n    letter-spacing: 0.05em;\n  }\n  .portrait-tag .dot {\n    width: 8px;\n    height: 8px;\n    border-radius: 50%;\n    background: #22C55E;\n    box-shadow: 0 0 12px #22C55E;\n    animation: pulse 2s ease-in-out infinite;\n  }\n  .portrait-tag.t1 { top: 40px; left: 40px; }\n  .portrait-tag.t2 { bottom: 40px; right: 40px; }\n  .portrait-tag.t3 { top: 50%; right: -20px; background: rgba(30, 95, 217, 0.9); }\n\n  .code-chip {\n    position: absolute;\n    top: 40px;\n    right: 40px;\n    padding: 16px 20px;\n    background: rgba(255, 255, 255, 0.08);\n    border: 1px solid rgba(255, 255, 255, 0.14);\n    border-radius: 12px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    color: rgba(255, 255, 255, 0.85);\n    line-height: 1.6;\n  }\n  .code-chip .tk-k { color: #FF7B72; }\n  .code-chip .tk-s { color: #A5D6FF; }\n  .code-chip .tk-c { color: #8B949E; }\n\n  /* ---------- Shared content slide (2, 3, 4) ---------- */\n  .content-slide {\n    background: var(--paper);\n  }\n\n  /* ---------- Slide 2: Experience ---------- */\n  .s2-body {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 48px;\n    margin-top: 72px;\n    flex: 1;\n  }\n  .domain-card {\n    position: relative;\n    border: 1px solid var(--line);\n    border-radius: 16px;\n    padding: 48px;\n    background: var(--paper);\n    overflow: hidden;\n    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  .domain-card::before {\n    content: '';\n    position: absolute;\n    top: 0; left: 0;\n    width: 4px;\n    height: 100%;\n    background: var(--blue);\n  }\n  .domain-card.sfmc::before {\n    background: linear-gradient(180deg, #00A1E0 0%, #0090C9 100%);\n  }\n  .domain-card.magento::before {\n    background: linear-gradient(180deg, #F46F25 0%, #E35D14 100%);\n  }\n  .domain-logo {\n    width: 72px;\n    height: 72px;\n    border-radius: 14px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin-bottom: 32px;\n  }\n  .sfmc .domain-logo { background: #EAF6FB; color: #0090C9; }\n  .magento .domain-logo { background: #FDEFE5; color: #E35D14; }\n\n  .domain-eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 10px;\n  }\n  .domain-title {\n    font-size: 44px;\n    font-weight: 700;\n    letter-spacing: -0.02em;\n    color: var(--ink);\n    margin: 0 0 8px 0;\n    line-height: 1.05;\n  }\n  .domain-sub {\n    font-size: 26px;\n    color: var(--muted);\n    margin: 0 0 32px 0;\n    font-weight: 500;\n  }\n  .domain-points {\n    list-style: none;\n    padding: 0;\n    margin: 0;\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n  }\n  .domain-points li {\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-2);\n    padding-left: 28px;\n    position: relative;\n  }\n  .domain-points li::before {\n    content: '';\n    position: absolute;\n    left: 0;\n    top: 14px;\n    width: 14px;\n    height: 2px;\n    background: var(--blue);\n  }\n\n  .s2-footer {\n    margin-top: 48px;\n    padding: 32px 40px;\n    background: var(--paper-2);\n    border-radius: 14px;\n    border-left: 3px solid var(--blue);\n    display: flex;\n    align-items: center;\n    gap: 32px;\n  }\n  .s2-footer-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 24px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--blue);\n    white-space: nowrap;\n  }\n  .s2-footer-text {\n    font-size: 26px;\n    color: var(--ink-2);\n    font-weight: 500;\n    line-height: 1.35;\n
